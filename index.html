<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alliance Cartographer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="./css/side-panel.css">
  <link rel="stylesheet" href="./css/layout.css">
  <style>
    .canvas-shell svg#graph {
      display: block;
      width: 100%;
      height: 100%;
    }
    .map-land {
      fill: #1e2d3d;
      stroke: #2a3f52;
      stroke-width: 0.5;
    }
    .map-country {
      stroke: #2a3f52;
      stroke-width: 0.5;
    }
    .minimap-shell {
      position: absolute;
      bottom: 16px;
      right: 16px;
      width: 180px;
      height: 110px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      overflow: hidden;
      background: rgba(0,0,0,0.4);
      pointer-events: none;
    }
    .minimap-shell svg#minimap {
      display: block;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <main class="app-main">

      <!-- Full-screen map canvas -->
      <div class="canvas-shell main">

        <!-- Sidebar toggle (top-left) -->
        <button class="sidebar-toggle" id="sidebarToggle" aria-label="Ouvrir le menu" aria-expanded="false">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>

        <!-- Backdrop (closes sidebar on outside click) -->
        <div class="ls-backdrop" id="lsBackdrop" aria-hidden="true"></div>

        <!-- Left sidebar -->
        <aside class="left-sidebar ls-hidden" id="leftSidebar" aria-hidden="true">

          <div class="ls-header">
            <div class="ls-brand">
              <div class="ls-brand-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="10"></circle>
                  <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                  <line x1="2" y1="12" x2="22" y2="12"></line>
                </svg>
              </div>
              <span class="ls-brand-title">Alliance Cartographer</span>
            </div>
            <button class="ls-close" id="lsClose" aria-label="Fermer le menu">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
              </svg>
            </button>
          </div>

          <!-- Search -->
          <div class="ls-search-wrap">
            <input
              type="text"
              id="lsSearch"
              class="ls-search"
              placeholder="Rechercher un pays…"
              autocomplete="off"
              spellcheck="false"
            >
          </div>

          <!-- Scrollable body -->
          <div class="ls-body">

            <!-- Nations section (open by default) -->
            <div class="ls-section">
              <button class="ls-section-btn" id="lsNationsBtn" aria-expanded="true">
                <span>Nations</span>
                <svg class="ls-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
              </button>
              <div class="ls-section-content" id="lsNationsContent">
                <div id="lsCountryList">
                  <div class="ls-empty">Chargement…</div>
                </div>
              </div>
            </div>

            <!-- Scénarios section (collapsed by default) -->
            <div class="ls-section">
              <button class="ls-section-btn" id="lsScenariosBtn" aria-expanded="false">
                <span>Scénarios</span>
                <svg class="ls-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
              </button>
              <div class="ls-section-content ls-collapsed" id="lsScenariosContent">
                <div id="lsScenariosList">
                  <div class="ls-empty">Chargement…</div>
                </div>
              </div>
            </div>

          </div>
        </aside>

        <!-- Map SVG -->
        <svg id="graph" width="100%" height="100%"></svg>

        <!-- Minimap -->
        <div class="minimap-shell">
          <svg id="minimap" width="100%" height="100%"></svg>
        </div>

        <!-- Right side panel (node / edge details) -->
        <div id="sidePanel" class="side-panel sp-hidden"></div>

      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
  <script src="./js/app.js" type="module"></script>
</body>
</html>
