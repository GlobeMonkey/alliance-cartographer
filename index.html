<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alliance Cartographer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="./css/side-panel.css">
  <link rel="stylesheet" href="./css/layout.css">
  <style>
    .canvas-shell svg#graph {
      display: block;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at 50% 60%, #071524 0%, #030810 100%);
    }
    .map-land {
      fill: #0a1628;
      stroke: rgba(255,255,255,0.06);
      stroke-width: 0.4px;
    }
    .map-country {
      stroke: rgba(255,255,255,0.05);
      stroke-width: 0.5px;
      transition: fill 0.3s var(--ease);
    }
    .map-country.is-hovered {
      fill: rgba(96, 165, 250, 0.12) !important;
      stroke: rgba(96, 165, 250, 0.4) !important;
      stroke-width: 1px !important;
    }
    .map-country.is-focused {
      fill: rgba(96, 165, 250, 0.20) !important;
      stroke: rgba(96, 165, 250, 0.8) !important;
      stroke-width: 1.5px !important;
      filter: drop-shadow(0 0 8px rgba(96, 165, 250, 0.3));
    }
    /* Annexed/de-facto controlled territories merge visually into parent state */
    .map-land.is-unrecognized-border {
      stroke: none;
    }
    .map-country.is-unrecognized-border {
      stroke: none !important;
    }
    /* When selected, dotted yellow border indicates non-recognized status */
    .map-country.is-unrecognized-focused {
      fill: rgba(96, 165, 250, 0.20) !important;
      stroke: rgba(251, 191, 36, 0.9) !important;
      stroke-width: 1.5px !important;
      stroke-dasharray: 6, 3 !important;
      filter: drop-shadow(0 0 6px rgba(251, 191, 36, 0.25));
    }
    .minimap-shell {
      position: absolute;
      bottom: 16px;
      right: 16px;
      width: 180px;
      height: 110px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      overflow: hidden;
      background: rgba(0,0,0,0.4);
      pointer-events: none;
    }
    .minimap-shell svg#minimap {
      display: block;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <main class="app-main">

      <!-- Full-screen map canvas -->
      <div class="canvas-shell main">

        <!-- Sidebar toggle (top-left) -->
        <button class="sidebar-toggle" id="sidebarToggle" aria-label="Ouvrir le menu" aria-expanded="false">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>

        <!-- Settings button (top-right) -->
        <div class="settings-wrap" id="settingsWrap">
          <button class="settings-btn" id="settingsBtn" aria-label="Paramètres">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"></circle>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
            </svg>
          </button>
          <div class="settings-popup" id="settingsPopup" hidden>
            <div class="settings-popup-header" data-i18n="settingsTitle">Paramètres</div>
            <div class="settings-item">
              <span class="settings-item-label" data-i18n="colorblind">Mode daltonien</span>
              <div class="toggle-switch" id="colorblindToggle" role="switch" aria-checked="false"><div class="toggle-knob"></div></div>
            </div>
            <div class="settings-item">
              <span class="settings-item-label" data-i18n="lightMode">Mode clair</span>
              <div class="toggle-switch" id="lightToggle" role="switch" aria-checked="false"><div class="toggle-knob"></div></div>
            </div>
            <div class="settings-item">
              <span class="settings-item-label" data-i18n="compareMode">Mode comparaison</span>
              <div class="toggle-switch" id="compareToggle" role="switch" aria-checked="false"><div class="toggle-knob"></div></div>
            </div>
            <div class="settings-item">
              <span class="settings-item-label" data-i18n="language">Langue</span>
              <div class="lang-switch" id="langSwitch">
                <button class="lang-btn active" data-lang="fr">FR</button>
                <button class="lang-btn" data-lang="en">EN</button>
              </div>
            </div>
            <div class="settings-divider"></div>
            <div class="settings-item settings-item--col">
              <span class="settings-item-label" data-i18n="heatmapLabel">Heatmap géopolitique</span>
              <select class="settings-select" id="heatmapSelect">
                <option value="" data-i18n="heatmapOff">— Désactivé</option>
                <option value="gdp" data-i18n="heatmapGdp">PIB</option>
                <option value="pop" data-i18n="heatmapPop">Population</option>
                <option value="conflict" data-i18n="heatmapConflict">Conflits</option>
              </select>
            </div>
            <div class="settings-divider"></div>
            <button class="settings-action-btn" id="exportPng" data-i18n="exportPng">Exporter PNG</button>
            <button class="settings-action-btn" id="exportSvg" data-i18n="exportSvg">Exporter SVG</button>
            <button class="settings-action-btn" id="copyLink" data-i18n="copyLink">Copier le lien</button>
          </div>
        </div>

        <!-- Alliance toggle panel (top-left, below burger) -->
        <div class="alliance-panel" id="alliancePanel" hidden>
          <div class="alliance-panel-title">Blocs &amp; Alliances</div>
          <div id="alliancePanelList"></div>
        </div>

        <!-- Backdrop (closes sidebar on outside click) -->
        <div class="ls-backdrop" id="lsBackdrop" aria-hidden="true"></div>

        <!-- Left sidebar -->
        <aside class="left-sidebar ls-hidden" id="leftSidebar" aria-hidden="true">

          <div class="ls-header">
            <div class="ls-brand">
              <div class="ls-brand-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="10"></circle>
                  <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                  <line x1="2" y1="12" x2="22" y2="12"></line>
                </svg>
              </div>
              <span class="ls-brand-title">Alliance Cartographer</span>
            </div>
            <button class="ls-close" id="lsClose" aria-label="Fermer le menu">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
              </svg>
            </button>
          </div>

          <!-- Search -->
          <div class="ls-search-wrap">
            <input
              type="text"
              id="lsSearch"
              class="ls-search"
              placeholder="Rechercher un pays…"
              autocomplete="off"
              spellcheck="false"
            >
          </div>

          <!-- Scrollable body -->
          <div class="ls-body">

            <!-- Nations section (open by default) -->
            <div class="ls-section">
              <button class="ls-section-btn" id="lsNationsBtn" aria-expanded="true">
                <span data-i18n="nations">Nations</span>
                <svg class="ls-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
              </button>
              <div class="ls-section-content" id="lsNationsContent">
                <div id="lsCountryList">
                  <div class="ls-empty">Chargement…</div>
                </div>
              </div>
            </div>

            <!-- Scénarios section (collapsed by default) -->
            <div class="ls-section">
              <button class="ls-section-btn" id="lsScenariosBtn" aria-expanded="false">
                <span data-i18n="scenarios">Scénarios</span>
                <svg class="ls-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
              </button>
              <div class="ls-section-content ls-collapsed" id="lsScenariosContent">
                <div id="lsScenariosList">
                  <div class="ls-empty">Chargement…</div>
                </div>
              </div>
            </div>

          </div>
        </aside>

        <!-- Map SVG -->
        <svg id="graph" width="100%" height="100%"></svg>

        <!-- Minimap -->
        <div class="minimap-shell">
          <svg id="minimap" width="100%" height="100%"></svg>
        </div>

        <!-- Right side panel (node / edge details) -->
        <div id="sidePanel" class="side-panel sp-hidden"></div>

        <!-- Timeline bar -->
        <div class="timeline-bar" id="timelineBar">
          <span class="timeline-label" data-i18n="timelineLabel">Chronologie</span>
          <span class="timeline-year" id="timelineYear">2026</span>
          <input type="range" id="timelineSlider" min="1945" max="2026" value="2026" step="1" class="timeline-slider">
          <span class="timeline-bound">1945</span>
          <span class="timeline-bound">2026</span>
          <span class="live-badge" aria-label="Année courante">LIVE</span>
        </div>

        <!-- Floating map tooltip -->
        <div id="tooltip" class="map-tooltip" role="tooltip" aria-hidden="true"></div>

        <!-- Comparison panel -->
        <div class="compare-panel" id="comparePanel" hidden>
          <button class="compare-close" id="compareClose" aria-label="Fermer">×</button>
          <div class="compare-body" id="compareBody">
            <div class="compare-card" id="compareCard0">
              <div class="compare-empty" data-i18n="compareInstruction">Cliquez 2 pays à comparer</div>
            </div>
            <div class="compare-vs">VS</div>
            <div class="compare-card" id="compareCard1"></div>
          </div>
        </div>

        <!-- Heatmap legend -->
        <div class="heatmap-legend" id="heatmapLegend" hidden>
          <div class="heatmap-legend-title" id="heatmapTitle"></div>
          <div class="heatmap-gradient"></div>
          <div class="heatmap-scale">
            <span id="heatmapMin">min</span>
            <span id="heatmapMax">max</span>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
  <script src="./js/app.js?v=2" type="module"></script>
</body>
</html>
